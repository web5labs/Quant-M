node_id = "quant-m-node"
workspace_dir = "workspace"

[memory]
sqlite_path = "workspace/memory/brain.db"
core_markdown = "workspace/MEMORY.md"
daily_dir = "workspace/daily"
vector_weight = 0.7
keyword_weight = 0.3
vector_dims = 64

[state_sql]
sqlite_path = "workspace/state/shared-state.db"

[heartbeat]
enabled = true
interval_seconds = 1800
tasks_file = "workspace/HEARTBEAT.md"

[worker]
inbox_path = "workspace/queue/inbox.ndjson"
outbox_path = "workspace/queue/outbox.ndjson"
inflight_path = "workspace/queue/inflight.json"
state_path = "workspace/state/worker_state.json"
dead_letter_path = "workspace/queue/dead-letter.ndjson"
poll_interval_seconds = 3
command_timeout_seconds = 60
concurrency = 1
max_retries = 1
max_inbox_depth = 2000
allow_shell_commands = false
allow_http_get = false
allow_insecure_https = false
http_get_mode = "dry_run"
http_get_sandbox_hosts = []

[adapters]
terminal_enabled = true
webhook_timeout_seconds = 10

[logging]
file = "workspace/logs/quant-m.log"
max_bytes = 1048576
keep_files = 3

[skills]
dir = "workspace/skills"
allow_shell_commands = false

[llm]
enabled = false
api_base = "https://openrouter.ai/api/v1"
model = "qwen/qwen3-coder"
api_key_env = "OPENROUTER_API_KEY"
temperature = 0.3
max_tokens = 512
request_timeout_seconds = 60

[telegram]
enabled = false
poll_interval_seconds = 3

[chat_channels]
enabled = false
allowed_channels = [
    "telegram",
    "discord",
    "slack",
    "signal",
    "whatsapp",
    "ichat",
    "email",
]
default_channel = "telegram"

[forex]
redb_path = "workspace/state/forex.redb"

[runtime]
profile = "edge"
session_dir = "workspace/state/sessions"
external_network_enabled = false
multi_model_enabled = false
search_enabled = false
browser_harness_enabled = false

[context_guardian]
enabled = true
interval_seconds = 300
min_event_count = 1
high_risk_event_count = 40
branch_packet_path = "workspace/state/context-guardian/continuity-handoff.md"

[preferences]
preferred_openrouter_model = "qwen/qwen3-coder"

[preferences.preferred_remote_model]
provider = "openrouter"
model = "qwen/qwen3-coder"

[preferences.preferred_channel]
channel = "none"

[providers.lmstudio]
enabled = false
kind = "lm_studio"
api_base = "http://127.0.0.1:1234/v1"
api_key_env = ""
preferred_models = []
live_validation_allowed = false

[providers.ollama]
enabled = false
kind = "ollama"
api_base = "http://127.0.0.1:11434"
api_key_env = ""
preferred_models = ["qwen3-coder:7b"]
live_validation_allowed = false

[providers.openai]
enabled = false
kind = "open_ai"
api_base = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
preferred_models = [
    "gpt-5-codex",
    "gpt-5",
]
live_validation_allowed = false

[providers.openrouter]
enabled = true
kind = "open_router"
api_base = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
preferred_models = [
    "qwen/qwen3-coder",
    "openai/gpt-4o-mini",
]
live_validation_allowed = false

[tools.antgravity]
enabled = false
kind = "antgravity"
command = "antgravity"
validation_args = ["--version"]

[tools.anthropic]
enabled = false
kind = "anthropic"
command = "anthropic"
validation_args = ["--version"]

[tools.antigravity]
enabled = false
kind = "antigravity"
command = "antigravity"
validation_args = ["--version"]

[tools.claude]
enabled = false
kind = "claude"
command = "claude"
validation_args = ["--version"]

[tools.codex]
enabled = true
kind = "codex"
command = "codex"
validation_args = ["--version"]

[tools.gemini]
enabled = false
kind = "gemini"
command = "gemini"
validation_args = ["--version"]

[tools.hermes]
enabled = false
kind = "hermes"
command = "hermes"
validation_args = ["--version"]

[tools.lmstudio]
enabled = false
kind = "lm_studio"
command = "lms"
validation_args = ["--version"]

[tools.ollama]
enabled = false
kind = "ollama"
command = "ollama"
validation_args = ["--version"]

[tools.openclaw]
enabled = false
kind = "open_claw"
command = "openclaw"
validation_args = ["--version"]

[tools.opencode]
enabled = false
kind = "open_code"
command = "opencode"
validation_args = ["--version"]

[tools.pi-agent]
enabled = false
kind = "pi_agent"
command = "pi-agent"
validation_args = ["--version"]
